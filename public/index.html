<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Championship 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E10600;
    --dark: #0f0f0f;
    --surface: #1a1a1a;
    --card: #212121;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --McLaren: #FF8000;
    --RedBull: #3671C6;
    --Ferrari: #E8002D;
    --Mercedes: #27F4D2;
    --Williams: #64C4FF;
    --AstonMartin: #229971;
    --Alpine: #FF87BC;
    --RacingBulls: #6692FF;
    --Haas: #B6BABD;
    --KickSauber: #52E252;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; gap: 2rem; height: 56px;
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: 1px;
    color: var(--text); text-decoration: none;
  }
  .nav-logo span { color: var(--red); }
  .nav-tabs { display: flex; gap: 0; margin-left: auto; }
  .nav-tab {
    background: none; border: none; padding: 0 14px; height: 56px;
    font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color .15s; letter-spacing: .3px;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--text); border-bottom-color: var(--red); }
  .nav-season { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* HERO */
  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.75rem;
  }
  .hero-inner { max-width: 1100px; margin: 0 auto; }
  .hero-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--red); margin-bottom: 6px;
  }
  .hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px; font-weight: 700; letter-spacing: .5px;
    color: var(--text); margin-bottom: 1.25rem; line-height: 1.1;
  }
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .metric {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px; padding: .85rem 1rem;
  }
  .metric-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
  }
  .metric-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 700; color: var(--text);
  }
  .metric-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 1.75rem 2rem 4rem; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* SECTION HEADER */
  .section-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: .5px; color: var(--text);
  }
  .section-sub { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* TABLE */
  .f1-table { width: 100%; border-collapse: collapse; }
  .f1-table th {
    text-align: left; font-size: 10px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  .f1-table td {
    padding: 11px 10px; border-bottom: 1px solid var(--border);
    color: var(--text); vertical-align: middle; font-size: 14px;
  }
  .f1-table tr:last-child td { border-bottom: none; }
  .f1-table tbody tr { transition: background .1s; }
  .f1-table tbody tr:hover td { background: rgba(255,255,255,.03); }
  .pos { font-weight: 600; width: 28px; color: var(--muted); font-size: 13px; }
  .pos.p1 { color: var(--red); }
  .driver-name { font-weight: 600; font-size: 14px; }
  .driver-nat { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .team-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 7px; vertical-align: middle; flex-shrink: 0;
  }
  .pts-val { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
  .bar-wrap { width: 80px; }
  .bar-bg { background: rgba(255,255,255,.08); border-radius: 2px; height: 3px; }
  .bar-fill { border-radius: 2px; height: 3px; transition: width .4s ease; }

  /* GRID CARDS */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: .9rem 1rem;
  }
  .card.done { opacity: .55; }
  .card.next-race { border-left: 3px solid var(--red); border-radius: 0 10px 10px 0; opacity: 1; }
  .card-round { font-size: 10px; color: var(--muted); letter-spacing: .5px; margin-bottom: 3px; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .card-circuit { font-size: 11px; color: var(--muted); margin-bottom: 7px; }
  .card-winner { font-size: 11px; color: var(--muted); padding-top: 7px; border-top: 1px solid var(--border); }
  .card-winner strong { color: var(--text); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px; letter-spacing: .3px;
  }
  .badge-done { background: rgba(255,255,255,.06); color: var(--muted); }
  .badge-next { background: var(--red); color: #fff; }
  .badge-upcoming { background: rgba(255,255,255,.08); color: var(--muted); }

  /* MONTH SECTIONS */
  .month-section { margin-bottom: 1.75rem; }
  .month-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* CHART */
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; height: 340px; }

  /* LOADING / ERROR */
  .state-msg {
    text-align: center; padding: 3rem 1rem;
    font-size: 14px; color: var(--muted);
  }
  .state-msg .icon { font-size: 32px; margin-bottom: 10px; }
  .state-msg .title { color: var(--text); font-weight: 600; margin-bottom: 6px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid rgba(255,255,255,.1);
    border-top-color: var(--red); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RACE DETAIL */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Barlow', sans-serif;
    font-size: 13px; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; margin-bottom: 1.5rem; transition: color .15s, border-color .15s;
  }
  .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

  .race-detail-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
    display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: center;
  }
  .race-detail-eyebrow { font-size: 11px; color: var(--muted); letter-spacing: .5px; margin-bottom: 4px; }
  .race-detail-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 4px;
  }
  .race-detail-meta { font-size: 13px; color: var(--muted); }

  .detail-section { margin-bottom: 2rem; }
  .detail-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--text);
    margin-bottom: .85rem; padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .detail-section-title span { font-size: 16px; }

  .qual-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px; margin-bottom: 1rem;
  }
  .qual-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: .75rem .9rem;
  }
  .qual-session { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--red); text-transform: uppercase; margin-bottom: 2px; }
  .qual-driver { font-size: 13px; font-weight: 600; color: var(--text); }
  .qual-time { font-size: 12px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }

  .pit-badge {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; background: rgba(255,255,255,.06);
    color: var(--muted); margin-left: 8px; font-weight: 400;
  }

  .status-fin { color: var(--text); }
  .status-dnf { color: #ff6b6b; font-size: 12px; }
  .status-lap { color: var(--muted); font-size: 12px; }
  .fl-mark { color: #a855f7; font-size: 11px; font-weight: 600; margin-left: 4px; }

  /* DETAIL TABS */
  .dtab {
    background: none; border: none; padding: 7px 14px; font-size: 13px;
    font-family: 'Barlow', sans-serif; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s;
  }
  .dtab:hover { color: var(--text); }
  .dtab.on { color: var(--text); border-bottom-color: var(--red); font-weight: 500; }
  .dpanel { display: none; }
  .dpanel.on { display: block; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; gap: 1rem; }
    .nav-tabs { gap: 0; overflow-x: auto; }
    .nav-tab { padding: 0 10px; font-size: 12px; }
    .hero { padding: 1.25rem 1rem 1.25rem; }
    .hero-title { font-size: 26px; }
    main { padding: 1.25rem 1rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">F<span>1</span> TRACKER</a>
  <div class="nav-tabs">
    <button class="nav-tab active" data-panel="drivers">Drivers</button>
    <button class="nav-tab" data-panel="constructors">Constructors</button>
    <button class="nav-tab" data-panel="trend">Trend</button>
    <button class="nav-tab" data-panel="schedule">Schedule</button>
  </div>
  <span class="nav-season" id="nav-season">Loading...</span>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">FIA Formula One World Championship</div>
    <div class="hero-title" id="hero-title">Championship Standings</div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Championship leader</div>
        <div class="metric-val" id="m-leader">—</div>
        <div class="metric-sub" id="m-leader-sub">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Gap to P2</div>
        <div class="metric-val" id="m-gap">—</div>
        <div class="metric-sub">points</div>
      </div>
      <div class="metric">
        <div class="metric-label">Rounds complete</div>
        <div class="metric-val" id="m-rounds">—</div>
        <div class="metric-sub" id="m-rounds-sub">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Leading constructor</div>
        <div class="metric-val" id="m-team">—</div>
        <div class="metric-sub" id="m-team-sub">—</div>
      </div>
    </div>
  </div>
</div>

<main>
  <div id="panel-drivers" class="panel active">
    <div class="state-msg"><div class="spinner"></div><div>Loading driver standings...</div></div>
  </div>
  <div id="panel-constructors" class="panel">
    <div class="state-msg"><div class="spinner"></div><div>Loading constructor standings...</div></div>
  </div>
  <div id="panel-trend" class="panel">
    <div class="state-msg"><div class="spinner"></div><div>Building points trend...</div></div>
  </div>
  <div id="panel-schedule" class="panel">
    <div class="state-msg"><div class="spinner"></div><div>Loading schedule...</div></div>
  </div>
  <div id="panel-race-detail" class="panel"></div>
</main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Replace this with your actual Vercel URL once deployed
const PROXY = 'https://f1-dashboard-azure.vercel.app/api/f1';

const TEAM_COLORS = {
  'McLaren':'#FF8000','Red Bull':'#3671C6','Ferrari':'#E8002D',
  'Mercedes':'#27F4D2','Williams':'#64C4FF','Aston Martin':'#229971',
  'Alpine':'#FF87BC','Racing Bulls':'#6692FF','Haas':'#B6BABD','Kick Sauber':'#52E252',
  'RB F1 Team':'#6692FF','Sauber':'#52E252'
};
const PALETTE = ['#FF8000','#3671C6','#E8002D','#27F4D2','#64C4FF','#FF87BC','#B6BABD','#52E252','#229971','#6692FF'];

function getTeamName(d) {
  if (d.Constructors?.[0]?.name) return d.Constructors[0].name;
  if (d.Constructor?.name) return d.Constructor.name;
  if (Array.isArray(d.Constructor) && d.Constructor[0]?.name) return d.Constructor[0].name;
  return "—";
}

function tc(name) {
  if (!name) return '#888';
  for (const [k,v] of Object.entries(TEAM_COLORS)) {
    if (name.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return '#888';
}

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(`${PROXY}?path=${encodeURIComponent(path)}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function err(panelId, msg) {
  document.getElementById(panelId).innerHTML = `
    <div class="state-msg">
      <div class="icon">⚠️</div>
      <div class="title">Could not load data</div>
      <div>${msg}</div>
    </div>`;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentRound = 0;
let trendBuilt = false;

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'trend' && !trendBuilt) loadTrend();
  });
});

// ── DRIVERS ──────────────────────────────────────────────────────────────────
async function loadDrivers() {
  try {
    const data = await api('current/driverStandings');
    const sl = data.MRData.StandingsTable.StandingsLists[0];
    if (!sl) throw new Error('No standings data');

    currentRound = parseInt(sl.round);
    const season = sl.season;
    document.getElementById('nav-season').textContent = `${season} · Round ${sl.round}`;
    document.getElementById('hero-title').textContent = `${season} Championship`;

    const list = sl.DriverStandings;
    const maxPts = parseFloat(list[0].points);
    const p1 = parseFloat(list[0].points);
    const p2 = parseFloat(list[1].points);

    document.getElementById('m-leader').textContent = list[0].Driver.familyName;
    document.getElementById('m-leader-sub').textContent = `${p1} pts · ${getTeamName(list[0])}`;
    document.getElementById('m-gap').textContent = (p1 - p2).toFixed(0);
    document.getElementById('m-rounds').textContent = sl.round;
    document.getElementById('m-rounds-sub').textContent = `of 24 races`;

    let html = `
      <div class="section-head">
        <div class="section-title">Driver standings</div>
        <div class="section-sub">After round ${sl.round} · ${season}</div>
      </div>
      <table class="f1-table">
        <thead><tr>
          <th class="pos">#</th>
          <th>Driver</th>
          <th>Team</th>
          <th style="text-align:right">Pts</th>
          <th>Wins</th>
          <th style="min-width:85px">Progress</th>
        </tr></thead><tbody>`;

    list.forEach((d, i) => {
      const pts = parseFloat(d.points);
      const pct = Math.round((pts / maxPts) * 100);
      const teamName = getTeamName(d);
      const col = tc(teamName);
      html += `<tr>
        <td class="pos ${i === 0 ? 'p1' : ''}">${i + 1}</td>
        <td>
          <div class="driver-name">${d.Driver.givenName} ${d.Driver.familyName}</div>
          <div class="driver-nat">${d.Driver.nationality}</div>
        </td>
        <td style="white-space:nowrap">
          <span class="team-dot" style="background:${col}"></span>${teamName}
        </td>
        <td class="pts-val">${pts.toFixed(0)}</td>
        <td style="color:var(--muted);font-size:13px">${d.wins}</td>
        <td>
          <div class="bar-wrap">
            <div class="bar-bg">
              <div class="bar-fill" style="width:${pct}%;background:${col}"></div>
            </div>
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('panel-drivers').innerHTML = html;
  } catch(e) {
    err('panel-drivers', e.message);
  }
}

// ── CONSTRUCTORS ─────────────────────────────────────────────────────────────
async function loadConstructors() {
  try {
    const data = await api('current/constructorStandings');
    const sl = data.MRData.StandingsTable.StandingsLists[0];
    const list = sl.ConstructorStandings;
    const maxPts = parseFloat(list[0].points);

    document.getElementById('m-team').textContent = list[0].Constructor.name;
    document.getElementById('m-team-sub').textContent = `${parseFloat(list[0].points).toFixed(0)} pts`;

    let html = `
      <div class="section-head">
        <div class="section-title">Constructor standings</div>
        <div class="section-sub">After round ${sl.round} · ${sl.season}</div>
      </div>
      <table class="f1-table">
        <thead><tr>
          <th class="pos">#</th>
          <th>Constructor</th>
          <th>Nationality</th>
          <th style="text-align:right">Pts</th>
          <th>Wins</th>
          <th style="min-width:85px">Progress</th>
        </tr></thead><tbody>`;

    list.forEach((c, i) => {
      const pts = parseFloat(c.points);
      const pct = Math.round((pts / maxPts) * 100);
      const col = tc(c.Constructor.name);
      html += `<tr>
        <td class="pos ${i === 0 ? 'p1' : ''}">${i + 1}</td>
        <td style="white-space:nowrap">
          <span class="team-dot" style="background:${col}"></span>
          <strong>${c.Constructor.name}</strong>
        </td>
        <td style="color:var(--muted);font-size:13px">${c.Constructor.nationality}</td>
        <td class="pts-val">${pts.toFixed(0)}</td>
        <td style="color:var(--muted);font-size:13px">${c.wins}</td>
        <td>
          <div class="bar-wrap">
            <div class="bar-bg">
              <div class="bar-fill" style="width:${pct}%;background:${col}"></div>
            </div>
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('panel-constructors').innerHTML = html;
  } catch(e) {
    err('panel-constructors', e.message);
  }
}

// ── TREND ─────────────────────────────────────────────────────────────────────
async function loadTrend() {
  if (trendBuilt) return;
  document.getElementById('panel-trend').innerHTML = `<div class="state-msg"><div class="spinner"></div><div>Fetching ${currentRound} rounds of data — this takes a moment...</div></div>`;
  try {
    if (!currentRound) {
      const d = await api('current/driverStandings');
      currentRound = parseInt(d.MRData.StandingsTable.StandingsLists[0].round);
    }
    const top = (await api('current/driverStandings'))
      .MRData.StandingsTable.StandingsLists[0].DriverStandings.slice(0, 5);
    const ids = top.map(d => d.Driver.driverId);
    const names = top.map(d => d.Driver.familyName);

    const rounds = Array.from({ length: currentRound }, (_, i) => i + 1);
    const allRounds = [];
    for (const r of rounds) {
      const d = await api(`current/${r}/driverStandings`);
      allRounds.push(d.MRData.StandingsTable.StandingsLists[0]);
      await new Promise(res => setTimeout(res, 80));
    }

    const datasets = ids.map((id, idx) => ({
      label: names[idx],
      data: allRounds.map(sl => {
        if (!sl) return null;
        const d = sl.DriverStandings.find(x => x.Driver.driverId === id);
        return d ? parseFloat(d.points) : null;
      }),
      borderColor: PALETTE[idx],
      backgroundColor: PALETTE[idx] + '15',
      borderWidth: 2.5,
      pointRadius: 2,
      pointHoverRadius: 5,
      tension: 0.35,
      fill: false,
      spanGaps: true
    }));

    const legend = names.map((n, i) =>
      `<span class="legend-item"><span class="legend-dot" style="background:${PALETTE[i]}"></span>${n}</span>`
    ).join('');

    document.getElementById('panel-trend').innerHTML = `
      <div class="section-head">
        <div class="section-title">Points trend</div>
        <div class="section-sub">Top 5 drivers · cumulative points</div>
      </div>
      <div class="chart-legend">${legend}</div>
      <div class="chart-wrap">
        <canvas id="trendChart" role="img" aria-label="Line chart of cumulative points for top 5 drivers across all completed rounds.">Points trend data.</canvas>
      </div>`;

    new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: { labels: rounds.map(r => 'R' + r), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            mode: 'index', intersect: false,
            backgroundColor: '#1a1a1a',
            borderColor: 'rgba(255,255,255,.1)',
            borderWidth: 1,
            titleColor: '#f0f0f0',
            bodyColor: '#888',
            callbacks: {
              title: items => 'Round ' + items[0].label.replace('R', ''),
              label: item => ` ${item.dataset.label}: ${item.parsed.y} pts`
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,.05)' },
            ticks: { font: { size: 11 }, color: '#666', autoSkip: true, maxTicksLimit: 12 }
          },
          y: {
            grid: { color: 'rgba(255,255,255,.05)' },
            ticks: { font: { size: 11 }, color: '#666' },
            title: { display: true, text: 'Points', color: '#666', font: { size: 11 } }
          }
        },
        interaction: { mode: 'index', intersect: false }
      }
    });
    trendBuilt = true;
  } catch(e) {
    err('panel-trend', e.message);
  }
}

// ── SCHEDULE (merged calendar + results) ─────────────────────────────────────
const countdownIntervals = [];

function clearCountdowns() {
  countdownIntervals.forEach(id => clearInterval(id));
  countdownIntervals.length = 0;
}

function startCountdown(elementId, raceDateTime) {
  function update() {
    const el = document.getElementById(elementId);
    if (!el) { clearInterval(interval); return; }
    const diff = raceDateTime - Date.now();
    if (diff <= 0) {
      el.innerHTML = '<span style="color:var(--red);font-weight:600">Race day!</span>';
      clearInterval(interval);
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.innerHTML = `
      <div style="display:flex;gap:8px;margin-top:8px;">
        ${[['d',d],['h',h],['m',m],['s',s]].map(([u,v]) => `
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:700;color:var(--text);font-family:'Barlow Condensed',sans-serif;line-height:1">${String(v).padStart(2,'0')}</div>
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${u}</div>
          </div>`).join('<div style="color:var(--muted);font-size:16px;font-weight:300;align-self:flex-start;margin-top:2px">:</div>')}
      </div>`;
  }
  update();
  const interval = setInterval(update, 1000);
  countdownIntervals.push(interval);
}

async function loadSchedule() {
  try {
    const [schedData, resData] = await Promise.all([
      api('current'),
      api('current/results/1')
    ]);

    const allRaces = schedData.MRData.RaceTable.Races;
    const completed = resData.MRData.RaceTable.Races;
    const doneSet = new Set(completed.map(r => r.round));

    // Map completed rounds to winner + fastest lap
    const raceInfo = {};
    completed.forEach(r => {
      const w = r.Results?.[0];
      const fl = r.Results?.find(x => x.FastestLap?.rank === '1');
      if (w) raceInfo[r.round] = {
        winner: `${w.Driver.givenName} ${w.Driver.familyName}`,
        winnerTeam: getResultTeam(w),
        winnerCol: tc(getResultTeam(w)),
        fl: fl ? `${fl.Driver.familyName} · ${fl.FastestLap.Time.time}` : null
      };
    });

    let nextRound = null;
    for (const r of allRaces) {
      if (!doneSet.has(r.round)) { nextRound = r.round; break; }
    }

    const byMonth = {};
    allRaces.forEach(r => {
      const key = new Date(r.date).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(r);
    });

    const done = doneSet.size;
    const total = allRaces.length;
    let html = `
      <div class="section-head">
        <div class="section-title">Schedule</div>
        <div class="section-sub">${done} of ${total} races complete · click completed races for details</div>
      </div>`;

    const countdownQueue = [];

    for (const [month, races] of Object.entries(byMonth)) {
      html += `<div class="month-section"><div class="month-label">${month}</div><div class="card-grid">`;
      races.forEach(r => {
        const isDone = doneSet.has(r.round);
        const isNext = r.round === nextRound;
        const dateStr = new Date(r.date).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
        const info = raceInfo[r.round];

        if (isDone) {
          // ── Completed race card — clickable ──────────────────────────────
          const col = info?.winnerCol || '#888';
          html += `<div class="card done" style="cursor:pointer;transition:border-color .15s;opacity:1"
            onmouseenter="this.style.borderColor='rgba(255,255,255,.25)';this.style.opacity='1'"
            onmouseleave="this.style.borderColor='var(--border)';this.style.opacity='0.75'"
            style="opacity:0.75"
            onclick="loadRaceDetail(${r.round}, '${r.raceName.replace(/'/g,"\'")}', '${r.date}', '${r.Circuit.circuitName.replace(/'/g,"\'")}', '${r.Circuit.Location.country}')">
            <div class="card-round">Round ${r.round} · ${dateStr}</div>
            <div class="card-name">${r.raceName}</div>
            <div class="card-circuit" style="margin-bottom:7px">${r.Circuit.Location.country}</div>
            <span class="badge badge-done">Completed</span>
            ${info ? `
              <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
                <span style="display:inline-block;width:3px;height:28px;background:${col};border-radius:2px;flex-shrink:0"></span>
                <div>
                  <div style="font-weight:600;font-size:13px;color:#f0f0f0">${info.winner}</div>
                  <div style="font-size:11px;color:var(--muted)">${info.winnerTeam}</div>
                </div>
              </div>
              ${info.fl ? `<div style="font-size:11px;color:var(--muted);margin-top:5px">⚡ ${info.fl}</div>` : ''}
              <div style="font-size:11px;color:var(--red);margin-top:6px;font-weight:500">View details →</div>
            ` : ''}
          </div>`;
        } else {
          // ── Upcoming race card — with countdown ──────────────────────────
          const raceTimeStr = r.time || '12:00:00Z';
          const raceDateTime = new Date(`${r.date}T${raceTimeStr}`).getTime();
          const cdId = `cd-${r.round}`;
          const cardClass = isNext ? 'card next-race' : 'card';
          const badge = isNext
            ? `<span class="badge badge-next">Next race</span>`
            : `<span class="badge badge-upcoming">Upcoming</span>`;

          html += `<div class="${cardClass}">
            <div class="card-round">Round ${r.round} · ${dateStr}</div>
            <div class="card-name">${r.raceName}</div>
            <div class="card-circuit">${r.Circuit.circuitName}</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${r.Circuit.Location.country}</div>
            ${badge}
            <div id="${cdId}"></div>
          </div>`;
          countdownQueue.push({ id: cdId, raceDateTime });
        }
      });
      html += '</div></div>';
    }

    clearCountdowns();
    document.getElementById('panel-schedule').innerHTML = html;
    // Start all countdowns after DOM update
    countdownQueue.forEach(({ id, raceDateTime }) => startCountdown(id, raceDateTime));

  } catch(e) {
    err('panel-schedule', e.message);
  }
}

// ── RACE DETAIL ───────────────────────────────────────────────────────────────
// Safe constructor name getter for race result/qualifying objects
// Handles both Constructor.name and Constructors[0].name shapes
function getResultTeam(r) {
  if (r.Constructor?.name) return r.Constructor.name;
  if (r.Constructors?.[0]?.name) return r.Constructors[0].name;
  return '—';
}

function switchDetailTab(tab) {
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.dpanel').forEach(p => p.classList.remove('on'));
  document.querySelector(`.dtab[data-dtab="${tab}"]`).classList.add('on');
  document.getElementById('dp-' + tab).classList.add('on');
}

async function loadRaceDetail(round, raceName, date, circuit, country) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const detail = document.getElementById('panel-race-detail');
  detail.classList.add('active');
  detail.innerHTML = `<div class="state-msg"><div class="spinner"></div><div>Loading race details...</div></div>`;

  try {
    const season = document.getElementById('nav-season').textContent.split(' ·')[0].trim();
    const [raceData, qualData, pitData] = await Promise.all([
      api(`${season}/${round}/results`),
      api(`${season}/${round}/qualifying`),
      api(`${season}/${round}/pitstops`)
    ]);

    const results = raceData.MRData.RaceTable.Races[0]?.Results || [];
    const qualResults = qualData.MRData.RaceTable.Races[0]?.QualifyingResults || [];
    const pitStops = pitData.MRData.RaceTable.Races[0]?.PitStops || [];

    const pitMap = {};
    pitStops.forEach(p => { pitMap[p.driverId] = (pitMap[p.driverId] || 0) + 1; });

    const dateStr = new Date(date).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

    // ── Derived data ──────────────────────────────────────────────────────────
    const p1 = results[0], p2 = results[1], p3 = results[2];
    const pole = qualResults[0];
    const fl = results.find(r => r.FastestLap?.rank === '1');

    const podiumColors = ['#FFD700','#C0C0C0','#CD7F32'];

    // ── Shell ─────────────────────────────────────────────────────────────────
    let html = `
      <button class="back-btn" onclick="backToResults()">← Back to results</button>
      <div class="race-detail-hero">
        <div>
          <div class="race-detail-eyebrow">Round ${round} · ${season} · ${country}</div>
          <div class="race-detail-name">${raceName}</div>
          <div class="race-detail-meta">${circuit} · ${dateStr}</div>
        </div>
        ${p1 ? `
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Winner</div>
          <div style="font-size:18px;font-weight:700;color:${tc(getResultTeam(p1))}">${p1.Driver.familyName}</div>
          <div style="font-size:12px;color:var(--muted)">${getResultTeam(p1)}</div>
        </div>` : ''}
      </div>

      <div style="display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:1.25rem;">
        <button class="dtab on" data-dtab="summary" onclick="switchDetailTab('summary')">Summary</button>
        <button class="dtab" data-dtab="race" onclick="switchDetailTab('race')">Race result</button>
        <button class="dtab" data-dtab="quali" onclick="switchDetailTab('quali')">Qualifying</button>
      </div>

      <div id="dp-summary" class="dpanel on">`;

    // ── SUMMARY TAB ───────────────────────────────────────────────────────────
    // Podium
    html += `<div class="detail-section">
      <div class="detail-section-title"><span>🏆</span> Podium</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;">`;

    [p1, p2, p3].forEach((r, i) => {
      if (!r) return;
      const team = getResultTeam(r);
      const col = tc(team);
      const medal = podiumColors[i];
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col}"></div>
        <div style="font-size:28px;font-weight:700;color:${medal};font-family:'Barlow Condensed',sans-serif;line-height:1;margin-bottom:6px;">P${i+1}</div>
        <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;">${r.Driver.givenName} ${r.Driver.familyName}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col}"></span>
          <span style="font-size:12px;color:var(--muted)">${team}</span>
        </div>
        <div style="font-size:12px;color:var(--muted)">${i === 0 ? (r.Time?.time || '—') : (r.Time?.time || r.status || '—')}</div>
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-top:4px">${r.points} pts</div>
      </div>`;
    });

    html += `</div></div>`;

    // Key stats row
    html += `<div class="detail-section">
      <div class="detail-section-title"><span>⚡</span> Key stats</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">`;

    if (pole) {
      const poleTeam = getResultTeam(pole);
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--red);margin-bottom:6px;">Pole position</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${pole.Driver.givenName} ${pole.Driver.familyName}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${poleTeam}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:4px;font-variant-numeric:tabular-nums">${pole.Q3 || pole.Q2 || pole.Q1 || '—'}</div>
      </div>`;
    }

    if (fl) {
      const flTeam = getResultTeam(fl);
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#a855f7;margin-bottom:6px;">Fastest lap</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${fl.Driver.givenName} ${fl.Driver.familyName}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${flTeam}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:4px;font-variant-numeric:tabular-nums">${fl.FastestLap?.Time?.time || '—'} <span style="font-size:11px;color:var(--muted)">Lap ${fl.FastestLap?.lap || ''}</span></div>
      </div>`;
    }

    if (results.length) {
      const dnfs = results.filter(r => r.status !== 'Finished' && !r.status.startsWith('+'));
      const totalPits = Object.values(pitMap).reduce((a,b) => a+b, 0);
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Race stats</div>
        <div style="font-size:13px;color:var(--text);margin-bottom:4px">${results[0]?.laps || '—'} laps</div>
        <div style="font-size:13px;color:var(--text);margin-bottom:4px">${totalPits} total pit stops</div>
        <div style="font-size:13px;color:${dnfs.length ? '#ff6b6b' : 'var(--muted)'}">${dnfs.length} DNF${dnfs.length !== 1 ? 's' : ''}</div>
      </div>`;
    }

    html += `</div></div></div>`;

    // ── RACE RESULT TAB ───────────────────────────────────────────────────────
    html += `<div id="dp-race" class="dpanel">`;
    if (results.length) {
      html += `<table class="f1-table">
        <thead><tr>
          <th class="pos">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th style="text-align:right">Laps</th>
          <th style="text-align:right">Gap / Status</th>
          <th style="text-align:right">Pts</th>
          <th style="text-align:right">Stops</th>
        </tr></thead><tbody>`;

      results.forEach(r => {
        const team = getResultTeam(r);
        const col = tc(team);
        const pos = parseInt(r.position);
        const finished = r.status === 'Finished' || r.status.startsWith('+');
        const statusClass = finished ? 'status-fin' : 'status-dnf';
        const gap = pos === 1 ? (r.Time?.time || '—') : finished ? (r.Time?.time || r.status) : `DNF · ${r.status}`;
        const flap = r.FastestLap?.rank === '1';
        const pits = pitMap[r.Driver.driverId] || '—';

        html += `<tr>
          <td class="pos ${pos === 1 ? 'p1' : ''}">${r.positionText}</td>
          <td>
            <div class="driver-name">${r.Driver.givenName} ${r.Driver.familyName}${flap ? ' <span class="fl-mark">⚡FL</span>' : ''}</div>
            <div class="driver-nat">${r.Driver.nationality}</div>
          </td>
          <td style="white-space:nowrap"><span class="team-dot" style="background:${col}"></span>${team}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${r.laps}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums" class="${statusClass}">${gap}</td>
          <td style="text-align:right;font-weight:600;font-size:13px">${r.points > 0 ? r.points : '—'}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${pits}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="state-msg">No race result data available.</div>';
    }
    html += '</div>';

    // ── QUALIFYING TAB ────────────────────────────────────────────────────────
    html += `<div id="dp-quali" class="dpanel">`;
    if (qualResults.length) {
      html += `<div class="qual-grid" style="margin-bottom:1rem;">
        ${['Q3','Q2','Q1'].map(session => {
          const top = qualResults.find(q => q[session]);
          if (!top) return '';
          return `<div class="qual-card">
            <div class="qual-session">${session} Fastest</div>
            <div class="qual-driver">${top.Driver.familyName}</div>
            <div class="qual-time">${top[session]}</div>
          </div>`;
        }).join('')}
      </div>
      <table class="f1-table">
        <thead><tr>
          <th class="pos">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th style="text-align:right">Q1</th>
          <th style="text-align:right">Q2</th>
          <th style="text-align:right">Q3</th>
        </tr></thead><tbody>`;

      qualResults.forEach(q => {
        const team = getResultTeam(q);
        const col = tc(team);
        html += `<tr>
          <td class="pos ${q.position === '1' ? 'p1' : ''}">${q.position}</td>
          <td>
            <div class="driver-name">${q.Driver.givenName} ${q.Driver.familyName}</div>
            <div class="driver-nat">${q.Driver.nationality}</div>
          </td>
          <td style="white-space:nowrap"><span class="team-dot" style="background:${col}"></span>${team}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted)">${q.Q1 || '—'}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted)">${q.Q2 || '—'}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--text);font-weight:${q.Q3 ? '600' : '400'}">${q.Q3 || '—'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="state-msg">No qualifying data available.</div>';
    }
    html += '</div>';

    detail.innerHTML = html;
    window.scrollTo(0, 0);
  } catch(e) {
    detail.innerHTML = `<button class="back-btn" onclick="backToResults()">← Back to results</button>
      <div class="state-msg"><div class="icon">⚠️</div><div class="title">Could not load race details</div><div>${e.message}</div></div>`;
  }
}

function backToResults() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-schedule').classList.add('active');
  document.querySelector('[data-panel="schedule"]').classList.add('active');
  window.scrollTo(0, 0);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadDrivers();
loadConstructors();
loadSchedule();
