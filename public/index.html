        <button class="dtab on" data-dtab="summary" onclick="switchDetailTab('summary')">Summary</button>
        <button class="dtab" data-dtab="race" onclick="switchDetailTab('race')">Race result</button>
        <button class="dtab" data-dtab="quali" onclick="switchDetailTab('quali')">Qualifying</button>
        <button class="dtab" id="sprint-tab" data-dtab="sprint" onclick="switchDetailTab('sprint')" style="display:none">Sprint</button>
      </div>

      <div id="dp-summary" class="dpanel on">`;

    // ── SUMMARY TAB ───────────────────────────────────────────────────────────
    // Podium
    html += `<div class="detail-section">
      <div class="detail-section-title"><span>🏆</span> Podium</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;">`;

    [p1, p2, p3].forEach((r, i) => {
      if (!r) return;
      const team = getResultTeam(r);
      const col = tc(team);
      const medal = podiumColors[i];
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col}"></div>
        <div style="font-size:28px;font-weight:700;color:${medal};font-family:'Barlow Condensed',sans-serif;line-height:1;margin-bottom:6px;">P${i+1}</div>
        <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;">${r.Driver.givenName} ${r.Driver.familyName}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col}"></span>
          <span style="font-size:12px;color:var(--muted)">${team}</span>
        </div>
        <div style="font-size:12px;color:var(--muted)">${i === 0 ? (r.Time?.time || '—') : (r.Time?.time || r.status || '—')}</div>
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-top:4px">${r.points} pts</div>
      </div>`;
    });

    html += `</div></div>`;

    // Key stats row
    html += `<div class="detail-section">
      <div class="detail-section-title"><span>⚡</span> Key stats</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">`;

    if (pole) {
      const poleTeam = getResultTeam(pole);
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--red);margin-bottom:6px;">Pole position</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${pole.Driver.givenName} ${pole.Driver.familyName}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${poleTeam}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:4px;font-variant-numeric:tabular-nums">${pole.Q3 || pole.Q2 || pole.Q1 || '—'}</div>
      </div>`;
    }

    if (fl) {
      const flTeam = getResultTeam(fl);
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#a855f7;margin-bottom:6px;">Fastest lap</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${fl.Driver.givenName} ${fl.Driver.familyName}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${flTeam}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:4px;font-variant-numeric:tabular-nums">${fl.FastestLap?.Time?.time || '—'} <span style="font-size:11px;color:var(--muted)">Lap ${fl.FastestLap?.lap || ''}</span></div>
      </div>`;
    }

    if (results.length) {
      const dnfs = results.filter(r => r.status !== 'Finished' && !r.status.startsWith('+'));
      const totalPits = Object.values(pitMap).reduce((a,b) => a+b, 0);
      html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Race stats</div>
        <div style="font-size:13px;color:var(--text);margin-bottom:4px">${results[0]?.laps || '—'} laps</div>
        <div style="font-size:13px;color:var(--text);margin-bottom:4px">${totalPits} total pit stops</div>
        <div style="font-size:13px;color:${dnfs.length ? '#ff6b6b' : 'var(--muted)'}">${dnfs.length} DNF${dnfs.length !== 1 ? 's' : ''}</div>
      </div>`;
    }

    html += `</div></div></div>`;

    // ── RACE RESULT TAB ───────────────────────────────────────────────────────
    html += `<div id="dp-race" class="dpanel">`;
    if (results.length) {
      html += `<table class="f1-table">
        <thead><tr>
          <th class="pos">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th style="text-align:right">Laps</th>
          <th style="text-align:right">Gap / Status</th>
          <th style="text-align:right">Pts</th>
          <th style="text-align:right">Stops</th>
        </tr></thead><tbody>`;

      results.forEach(r => {
        const team = getResultTeam(r);
        const col = tc(team);
        const pos = parseInt(r.position);
        const finished = r.status === 'Finished' || r.status.startsWith('+');
        const statusClass = finished ? 'status-fin' : 'status-dnf';
        const gap = pos === 1 ? (r.Time?.time || '—') : finished ? (r.Time?.time || r.status) : `DNF · ${r.status}`;
        const flap = r.FastestLap?.rank === '1';
        const pits = pitMap[r.Driver.driverId] || '—';

        html += `<tr>
          <td class="pos ${pos === 1 ? 'p1' : ''}">${r.positionText}</td>
          <td>
            <div class="driver-name">${r.Driver.givenName} ${r.Driver.familyName}${flap ? ' <span class="fl-mark">⚡FL</span>' : ''}</div>
            <div class="driver-nat">${r.Driver.nationality}</div>
          </td>
          <td style="white-space:nowrap"><span class="team-dot" style="background:${col}"></span>${team}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${r.laps}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums" class="${statusClass}">${gap}</td>
          <td style="text-align:right;font-weight:600;font-size:13px">${r.points > 0 ? r.points : '—'}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${pits}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="state-msg">No race result data available.</div>';
    }
    html += '</div>';

    // ── QUALIFYING TAB ────────────────────────────────────────────────────────
    html += `<div id="dp-quali" class="dpanel">`;
    if (qualResults.length) {
      html += `<div class="qual-grid" style="margin-bottom:1rem;">
        ${['Q3','Q2','Q1'].map(session => {
          const top = qualResults.find(q => q[session]);
          if (!top) return '';
          return `<div class="qual-card">
            <div class="qual-session">${session} Fastest</div>
            <div class="qual-driver">${top.Driver.familyName}</div>
            <div class="qual-time">${top[session]}</div>
          </div>`;
        }).join('')}
      </div>
      <table class="f1-table">
        <thead><tr>
          <th class="pos">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th style="text-align:right">Q1</th>
          <th style="text-align:right">Q2</th>
          <th style="text-align:right">Q3</th>
        </tr></thead><tbody>`;

      qualResults.forEach(q => {
        const team = getResultTeam(q);
        const col = tc(team);
        html += `<tr>
          <td class="pos ${q.position === '1' ? 'p1' : ''}">${q.position}</td>
          <td>
            <div class="driver-name">${q.Driver.givenName} ${q.Driver.familyName}</div>
            <div class="driver-nat">${q.Driver.nationality}</div>
          </td>
          <td style="white-space:nowrap"><span class="team-dot" style="background:${col}"></span>${team}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted)">${q.Q1 || '—'}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted)">${q.Q2 || '—'}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--text);font-weight:${q.Q3 ? '600' : '400'}">${q.Q3 || '—'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="state-msg">No qualifying data available.</div>';
    }
    html += '</div>';

    // ── SPRINT TAB ────────────────────────────────────────────────────────────
    html += `<div id="dp-sprint" class="dpanel">`;
    if (sprintResults.length) {
      const maxSprintPts = parseFloat(sprintResults[0]?.points || 8);
      html += `<table class="f1-table">
        <thead><tr>
          <th class="pos">Pos</th>
          <th>Driver</th>
          <th>Team</th>
          <th style="text-align:right">Laps</th>
          <th style="text-align:right">Gap / Status</th>
          <th style="text-align:right">Pts</th>
        </tr></thead><tbody>`;

      sprintResults.forEach(r => {
        const team = getResultTeam(r);
        const col = tc(team);
        const pos = parseInt(r.position);
        const finished = r.status === 'Finished' || r.status.startsWith('+');
        const statusClass = finished ? 'status-fin' : 'status-dnf';
        const gap = pos === 1 ? (r.Time?.time || '—') : finished ? (r.Time?.time || r.status) : `DNF · ${r.status}`;
        html += `<tr>
          <td class="pos ${pos === 1 ? 'p1' : ''}">${r.positionText}</td>
          <td>
            <div class="driver-name">${r.Driver.givenName} ${r.Driver.familyName}</div>
            <div class="driver-nat">${r.Driver.nationality}</div>
          </td>
          <td style="white-space:nowrap"><span class="team-dot" style="background:${col}"></span>${team}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${r.laps}</td>
          <td style="text-align:right;font-size:12px;font-variant-numeric:tabular-nums" class="${statusClass}">${gap}</td>
          <td style="text-align:right;font-weight:600;font-size:13px">${parseFloat(r.points) > 0 ? r.points : '—'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else {
      html += '<div class="state-msg" style="padding:2rem 0">No sprint race at this round.</div>';
    }
    html += '</div>';

    detail.innerHTML = html;
    // Show sprint tab only if this round had a sprint race
    const sprintTabEl = detail.querySelector('#sprint-tab');
    if (sprintTabEl) sprintTabEl.style.display = sprintResults.length ? '' : 'none';
    window.scrollTo(0, 0);
  } catch(e) {
    detail.innerHTML = `<button class="back-btn" onclick="backToResults()">← Back to results</button>
      <div class="state-msg"><div class="icon">⚠️</div><div class="title">Could not load race details</div><div>${e.message}</div></div>`;
  }
}

function backToResults() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-schedule').classList.add('active');
  document.querySelector('[data-panel="schedule"]').classList.add('active');
  window.scrollTo(0, 0);
}


// ── DRIVER PROFILE ────────────────────────────────────────────────────────────
async function loadDriverProfile(driverId, driverName, returnTo) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('panel-driver-profile');
  panel.classList.add('active');
  panel.innerHTML = `<div class="state-msg"><div class="spinner"></div><div>Loading ${driverName} profile...</div></div>`;

  try {
    const season = detectedSeason || selectedSeason;
    // Fetch driver info and all race results in parallel
    const [driverData, allResults] = await Promise.all([
      api(`drivers/${driverId}`),
      apiAllPages(`drivers/${driverId}/results`)
    ]);

    const driver = driverData.MRData.DriverTable.Drivers[0];
    if (!driver) throw new Error('Driver not found');

    // Derive seasons raced from results, then fetch each season's standing in parallel
    const seasonsRacedSet = [...new Set(allResults.map(r => r.season))].sort();
    // Fetch each season's standing for this specific driver
    // The endpoint returns the full standings list; find our driver in it
    const standingPages = await Promise.all(
      seasonsRacedSet.map(yr =>
        api(`${yr}/driverStandings`)
          .then(d => {
            const sl = d.MRData.StandingsTable?.StandingsLists?.[0];
            if (!sl) return null;
            const ds = sl.DriverStandings?.find(x => x.Driver?.driverId === driverId);
            return ds ? { season: sl.season, standing: ds } : null;
          })
          .catch(() => null)
      )
    );
    const allStandings = standingPages.filter(Boolean);

    // Career stats
    const wins = allResults.filter(r => r.Results?.[0]?.position === '1').length;
    const podiums = allResults.filter(r => {
      const pos = parseInt(r.Results?.[0]?.position);
      return pos >= 1 && pos <= 3;
    }).length;
    const poles = allResults.filter(r => r.Results?.[0]?.grid === '1').length;
    const fastestLaps = allResults.filter(r => r.Results?.[0]?.FastestLap?.rank === '1').length;
    // seasonsRacedSet already calculated above
    const championships = allStandings.filter(s => s.standing?.position === '1').length;
    const currentStanding = allStandings.find(s => s.season === season);
    const teamName = currentStanding?.standing ? getTeamName(currentStanding.standing) : '—';
    const teamCol = tc(teamName);

    const dob = driver.dateOfBirth ? new Date(driver.dateOfBirth).toLocaleDateString(undefined, { day:'numeric', month:'long', year:'numeric' }) : '—';
    const age = driver.dateOfBirth ? Math.floor((Date.now() - new Date(driver.dateOfBirth)) / 31557600000) : '—';

    // Season-by-season breakdown (last 10 seasons)
    const recentStandings = allStandings.slice(-10).reverse();

    let html = `
      <button class="back-btn" onclick="${returnTo === 'constructor' ? 'backToConstructorProfile()' : 'backToDrivers()'}">← Back to ${returnTo === 'constructor' ? 'constructor' : 'standings'}</button>

      <div class="race-detail-hero" style="position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${teamCol}"></div>
        <div>
          <div class="race-detail-eyebrow">${driver.nationality} · #${driver.permanentNumber || '—'}</div>
          <div class="race-detail-name">${driver.givenName} ${driver.familyName}</div>
          <div class="race-detail-meta">
            <span style="display:inline-flex;align-items:center;gap:5px">
              <span class="team-dot" style="background:${teamCol}"></span>${teamName}
            </span>
            · Born ${dob} (${age})
          </div>
        </div>
        <div style="text-align:right">
          ${championships > 0 ? `<div style="font-size:11px;color:var(--muted);margin-bottom:2px">World Champion</div>
          <div style="font-size:28px">${'🏆'.repeat(Math.min(championships,3))}</div>
          <div style="font-size:12px;color:var(--muted)">${championships}× champion</div>` :
          `<div style="font-size:11px;color:var(--muted);margin-bottom:2px">Seasons</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--text)">${seasonsRacedSet.length}</div>`}
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem;">
        ${[
          ['Wins', wins],
          ['Podiums', podiums],
          ['Pole positions', poles],
          ['Fastest laps', fastestLaps],
          ['Races', allResults.length],
          ['Championships', championships],
        ].map(([label, val]) => `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;text-align:center">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:${val > 0 ? 'var(--text)' : 'var(--muted)'};">${val}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px">${label}</div>
          </div>`).join('')}
      </div>`;

    // Season-by-season
    if (recentStandings.length) {
      html += `<div class="detail-section">
        <div class="detail-section-title"><span>📊</span> Season history <span style="font-size:12px;font-weight:400;color:var(--muted)">(last ${recentStandings.length} seasons)</span></div>
        <table class="f1-table">
          <thead><tr>
            <th>Season</th><th>Team</th>
            <th style="text-align:right">Pos</th>
            <th style="text-align:right">Pts</th>
            <th style="text-align:right">Wins</th>
          </tr></thead><tbody>`;

      recentStandings.forEach(sl => {
        const ds = sl.standing;
        if (!ds) return;
        const sTeam = getTeamName(ds);
        const sCol = tc(sTeam);
        const isChamp = ds.position === '1';
        html += `<tr>
          <td style="font-weight:600">${sl.season} ${isChamp ? '🏆' : ''}</td>
          <td style="white-space:nowrap"><span class="team-dot" style="background:${sCol}"></span>${sTeam}</td>
          <td style="text-align:right;font-weight:${isChamp ? '700' : '400'};color:${isChamp ? 'var(--red)' : 'var(--text)'}">${ds.position}</td>
          <td style="text-align:right;font-variant-numeric:tabular-nums">${ds.points}</td>
          <td style="text-align:right;color:var(--muted)">${ds.wins}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
    }

    // ── Historical race lookup ──────────────────────────────────────────────────
    if (allResults.length) {
      const allWins = allResults.filter(r => r.Results?.[0]?.position === '1').reverse();
      const allPoles = allResults.filter(r => r.Results?.[0]?.grid === '1').reverse();

      function raceRows(races, showAll) {
        const list = showAll ? races : races.slice(0, 8);
        return list.map(race => {
          const r = race.Results?.[0];
          if (!r) return '';
          const pos = parseInt(r.position);
          const isPodium = pos <= 3;
          const isWin = pos === 1;
          return `<tr>
            <td style="font-weight:500">${race.raceName.replace(' Grand Prix','').replace(' GP','')}</td>
            <td style="color:var(--muted);font-size:13px">${race.season}</td>
            <td style="text-align:right;color:var(--muted);font-size:13px">${r.grid}</td>
            <td style="text-align:right;font-weight:${isWin ? '700' : isPodium ? '600' : '400'};color:${isWin ? 'var(--red)' : isPodium ? 'var(--text)' : 'var(--muted)'}">${r.positionText}</td>
            <td style="text-align:right;color:var(--muted);font-size:13px">${parseFloat(r.points) > 0 ? r.points : '—'}</td>
          </tr>`;
        }).join('');
      }

      function tableHTML(id, rows, total, label) {
        return `<div class="detail-section">
          <div class="detail-section-title"><span>${label}</span>
            <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">${total} total</span>
          </div>
          ${total === 0 ? '<div style="color:var(--muted);font-size:13px;padding:.5rem 0">None recorded.</div>' : `
          <table class="f1-table" id="tbl-${id}">
            <thead><tr>
              <th>Race</th><th>Season</th>
              <th style="text-align:right">Grid</th>
              <th style="text-align:right">Finish</th>
              <th style="text-align:right">Pts</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${total > 8 ? `<button onclick="expandTable('${id}')" id="btn-${id}" style="
            margin-top:10px;background:none;border:1px solid var(--border);
            color:var(--muted);font-family:'Barlow',sans-serif;font-size:12px;
            padding:6px 14px;border-radius:6px;cursor:pointer;">
            Show all ${total} →
          </button>` : ''}
          `}
        </div>`;
      }

      // Store data globally for expand function
      window._driverResults = allResults;
      window._driverWins = allWins;
      window._driverPoles = allPoles;

      html += tableHTML('wins', raceRows(allWins, false), allWins.length, '🏆 All wins');
      html += tableHTML('poles', raceRows(allPoles, false), allPoles.length, '🏁 All pole positions');

      // Recent 10 races
      const recent = allResults.slice(-10).reverse();
      html += `<div class="detail-section">
        <div class="detail-section-title"><span>🏎️</span> Recent results</div>
        <table class="f1-table">
          <thead><tr>
            <th>Race</th><th>Season</th>
            <th style="text-align:right">Grid</th>
            <th style="text-align:right">Finish</th>
            <th style="text-align:right">Pts</th>
          </tr></thead><tbody>`;

      recent.forEach(race => {
        const r = race.Results?.[0];
        if (!r) return;
        const pos = parseInt(r.position);
        const isPodium = pos <= 3;
        const isWin = pos === 1;
        html += `<tr>
          <td style="font-weight:500">${race.raceName.replace(' Grand Prix','').replace(' GP','')}</td>
          <td style="color:var(--muted);font-size:13px">${race.season}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${r.grid}</td>
          <td style="text-align:right;font-weight:${isWin ? '700' : isPodium ? '600' : '400'};color:${isWin ? 'var(--red)' : isPodium ? 'var(--text)' : 'var(--muted)'}">${r.positionText}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${parseFloat(r.points) > 0 ? r.points : '—'}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
    }

    // ── All constructors this driver has raced for ───────────────────────────
    const constructorsMap = {};
    allResults.forEach(r => {
      const c = r.Results?.[0]?.Constructor;
      if (c) constructorsMap[c.constructorId] = { id: c.constructorId, name: c.name };
    });
    const allConstructors = Object.values(constructorsMap);

    if (allConstructors.length) {
      html += `<div class="detail-section">
        <div class="detail-section-title"><span>🏎️</span> Teams
          <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">${allConstructors.length} all-time</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${allConstructors.map(c => `
            <span onclick="loadConstructorProfile('${c.id}', '${c.name}', 'driver')"
              style="background:var(--card);border:1px solid ${tc(c.name)};border-radius:6px;
              padding:4px 10px;font-size:12px;color:var(--text);cursor:pointer;
              transition:border-color .15s,color .15s;display:inline-flex;align-items:center;gap:6px"
              onmouseenter="this.style.opacity='0.8'"
              onmouseleave="this.style.opacity='1'"
            ><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${tc(c.name)};flex-shrink:0"></span>${c.name}</span>
          `).join('')}
        </div>
      </div>`;
    }

    panel.innerHTML = html;
    window.scrollTo(0, 0);
  } catch(e) {
    panel.innerHTML = `<button class="back-btn" onclick="backToDrivers()">← Back to standings</button>
      <div class="state-msg"><div class="icon">⚠️</div><div class="title">Could not load profile</div><div>${e.message}</div></div>`;
  }
}


function expandTable(id) {
  const tbl = document.getElementById('tbl-' + id);
  const btn = document.getElementById('btn-' + id);
  if (!tbl || !btn) return;
  const data = id === 'wins' ? window._driverWins : window._driverPoles;
  const tbody = tbl.querySelector('tbody');
  tbody.innerHTML = data.map(race => {
    const r = race.Results?.[0];
    if (!r) return '';
    const pos = parseInt(r.position);
    const isPodium = pos <= 3;
    const isWin = pos === 1;
    return `<tr>
      <td style="font-weight:500">${race.raceName.replace(' Grand Prix','').replace(' GP','')}</td>
      <td style="color:var(--muted);font-size:13px">${race.season}</td>
      <td style="text-align:right;color:var(--muted);font-size:13px">${r.grid}</td>
      <td style="text-align:right;font-weight:${isWin ? '700' : isPodium ? '600' : '400'};color:${isWin ? 'var(--red)' : isPodium ? 'var(--text)' : 'var(--muted)'}">${r.positionText}</td>
      <td style="text-align:right;color:var(--muted);font-size:13px">${parseFloat(r.points) > 0 ? r.points : '—'}</td>
    </tr>`;
  }).join('');
  btn.style.display = 'none';
}

function backToDrivers() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-drivers').classList.add('active');
  document.querySelector('[data-panel="drivers"]').classList.add('active');
  window.scrollTo(0, 0);
}


// ── CONSTRUCTOR PROFILE ───────────────────────────────────────────────────────
async function loadConstructorProfile(constructorId, constructorName, returnTo) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('panel-constructor-profile');
  panel.classList.add('active');
  panel.innerHTML = `<div class="state-msg"><div class="spinner"></div><div>Loading ${constructorName} profile...</div></div>`;

  try {
    const season = detectedSeason || selectedSeason;
    const [teamData, allResults] = await Promise.all([
      api(`constructors/${constructorId}`),
      apiAllPages(`constructors/${constructorId}/results`)
    ]);

    const team = teamData.MRData.ConstructorTable.Constructors[0];
    if (!team) throw new Error('Constructor not found');

    // Derive seasons from results then fetch standings in parallel
    const seasonsSet = [...new Set(allResults.map(r => r.season))].sort();
    const standingPages = await Promise.all(
      seasonsSet.map(yr =>
        api(`${yr}/constructorStandings`)
          .then(d => {
            const sl = d.MRData.StandingsTable?.StandingsLists?.[0];
            if (!sl) return null;
            const cs = sl.ConstructorStandings?.find(x => x.Constructor?.constructorId === constructorId);
            return cs ? { season: sl.season, standing: cs } : null;
          })
          .catch(() => null)
      )
    );
    const allStandings = standingPages.filter(Boolean);

    // Career stats
    const wins       = allResults.filter(r => r.Results?.[0]?.position === '1').length;
    const podiums    = allResults.filter(r => parseInt(r.Results?.[0]?.position) <= 3).length;
    const poles      = allResults.filter(r => r.Results?.[0]?.grid === '1').length;
    const fastestLaps= allResults.filter(r => r.Results?.[0]?.FastestLap?.rank === '1').length;
    const championships = allStandings.filter(s => s.standing?.position === '1').length;
    const col = tc(team.name);

    // Current season standing
    const currentSt = allStandings.find(s => s.season === season)?.standing;

    // All drivers who've raced for this team (unique)
    const driversMap = {};
    allResults.forEach(r => {
      const d = r.Results?.[0]?.Driver;
      if (d) driversMap[d.driverId] = { id: d.driverId, name: d.givenName + ' ' + d.familyName };
    });
    const allDrivers = Object.values(driversMap);

    // All-time wins
    const allWins = allResults.filter(r => r.Results?.[0]?.position === '1').reverse();
    const allPoles = allResults.filter(r => r.Results?.[0]?.grid === '1').reverse();

    let html = `
      <button class="back-btn" onclick="${returnTo === 'driver' ? 'backToDriverProfile()' : 'backToConstructors()}'">← Back to ${returnTo === 'driver' ? 'driver' : 'standings'}</button>

      <div class="race-detail-hero" style="position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${col}"></div>
        <div>
          <div class="race-detail-eyebrow">${team.nationality} constructor</div>
          <div class="race-detail-name">${team.name}</div>
          <div class="race-detail-meta">
            ${currentSt ? `P${currentSt.position} · ${currentSt.points} pts in ${season}` : `${seasonsSet.length} seasons in F1`}
          </div>
        </div>
        <div style="text-align:right">
          ${championships > 0
            ? `<div style="font-size:11px;color:var(--muted);margin-bottom:2px">Constructors' Champion</div>
               <div style="font-size:28px">${'🏆'.repeat(Math.min(championships,3))}</div>
               <div style="font-size:12px;color:var(--muted)">${championships}× champion</div>`
            : `<div style="font-size:11px;color:var(--muted);margin-bottom:2px">Seasons</div>
               <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--text)">${seasonsSet.length}</div>`}
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem;">
        ${[
          ['Wins', wins],
          ['Podiums', podiums],
          ['Pole positions', poles],
          ['Fastest laps', fastestLaps],
          ['Races', allResults.length],
          ['Championships', championships],
        ].map(([label, val]) => `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;text-align:center">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:${val > 0 ? 'var(--text)' : 'var(--muted)'};">${val}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px">${label}</div>
          </div>`).join('')}
      </div>`;

    // ── Season history ────────────────────────────────────────────────────────
    if (allStandings.length) {
      const recent = allStandings.slice(-10).reverse();
      html += `<div class="detail-section">
        <div class="detail-section-title"><span>📊</span> Season history
          <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">(last ${recent.length} seasons)</span>
        </div>
        <table class="f1-table">
          <thead><tr>
            <th>Season</th>
            <th style="text-align:right">Pos</th>
            <th style="text-align:right">Pts</th>
            <th style="text-align:right">Wins</th>
          </tr></thead><tbody>`;

      recent.forEach(sl => {
        const ds = sl.standing;
        if (!ds) return;
        const isChamp = ds.position === '1';
        html += `<tr>
          <td style="font-weight:600">${sl.season} ${isChamp ? '🏆' : ''}</td>
          <td style="text-align:right;font-weight:${isChamp ? '700' : '400'};color:${isChamp ? 'var(--red)' : 'var(--text)'}">${ds.position}</td>
          <td style="text-align:right;font-variant-numeric:tabular-nums">${ds.points}</td>
          <td style="text-align:right;color:var(--muted)">${ds.wins}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
    }

    // ── All-time wins ─────────────────────────────────────────────────────────
    function constrRaceRows(races, showAll) {
      const list = showAll ? races : races.slice(0, 8);
      return list.map(race => {
        const r = race.Results?.[0];
        if (!r) return '';
        return `<tr>
          <td style="font-weight:500">${race.raceName.replace(' Grand Prix','').replace(' GP','')}</td>
          <td style="color:var(--muted);font-size:13px">${race.season}</td>
          <td style="font-size:13px">${r.Driver.givenName} ${r.Driver.familyName}</td>
          <td style="text-align:right;color:var(--muted);font-size:13px">${r.grid}</td>
          <td style="text-align:right;font-weight:600;color:var(--red)">${r.positionText}</td>
        </tr>`;
      }).join('');
    }

    function constrTableHTML(id, rows, total, label) {
      return `<div class="detail-section">
        <div class="detail-section-title"><span>${label.startsWith('🏆') ? '🏆' : '🏁'}</span> ${label.replace('🏆 ','').replace('🏁 ','')}
          <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">${total} total</span>
        </div>
        ${total === 0
          ? '<div style="color:var(--muted);font-size:13px;padding:.5rem 0">None recorded.</div>'
          : `<table class="f1-table" id="ctbl-${id}">
              <thead><tr>
                <th>Race</th><th>Season</th><th>Driver</th>
                <th style="text-align:right">Grid</th>
                <th style="text-align:right">Pos</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
            ${total > 8 ? `<button onclick="expandConstrTable('${id}')" id="cbtn-${id}" style="
              margin-top:10px;background:none;border:1px solid var(--border);
              color:var(--muted);font-family:'Barlow',sans-serif;font-size:12px;
              padding:6px 14px;border-radius:6px;cursor:pointer;">
              Show all ${total} →
            </button>` : ''}`}
      </div>`;
    }

    window._constrWins = allWins;
    window._constrPoles = allPoles;

    html += constrTableHTML('wins', constrRaceRows(allWins, false), allWins.length, '🏆 All wins');
    html += constrTableHTML('poles', constrRaceRows(allPoles, false), allPoles.length, '🏁 All pole positions');

    // ── All drivers ───────────────────────────────────────────────────────────
    if (allDrivers.length) {
      html += `<div class="detail-section">
        <div class="detail-section-title"><span>🧑‍✈️</span> Drivers
          <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">${allDrivers.length} all-time</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${allDrivers.map(d => `
            <span onclick="loadDriverProfile('${d.id}', '${d.name}', 'constructor')"
              style="background:var(--card);border:1px solid var(--border);border-radius:6px;
              padding:4px 10px;font-size:12px;color:var(--text);cursor:pointer;
              transition:border-color .15s,color .15s"
              onmouseenter="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='#fff'"
              onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text)'"
            >${d.name}</span>
          `).join('')}
        </div>
      </div>`;
    }

    panel.innerHTML = html;
    window.scrollTo(0, 0);
  } catch(e) {
    panel.innerHTML = `<button class="back-btn" onclick="backToConstructors()">← Back to standings</button>
      <div class="state-msg"><div class="icon">⚠️</div><div class="title">Could not load constructor profile</div><div>${e.message}</div></div>`;
  }
}

function expandConstrTable(id) {
  const tbl = document.getElementById('ctbl-' + id);
  const btn = document.getElementById('cbtn-' + id);
  if (!tbl || !btn) return;
  const data = id === 'wins' ? window._constrWins : window._constrPoles;
  const tbody = tbl.querySelector('tbody');
  tbody.innerHTML = data.map(race => {
    const r = race.Results?.[0];
    if (!r) return '';
    return `<tr>
      <td style="font-weight:500">${race.raceName.replace(' Grand Prix','').replace(' GP','')}</td>
      <td style="color:var(--muted);font-size:13px">${race.season}</td>
      <td style="font-size:13px">${r.Driver.givenName} ${r.Driver.familyName}</td>
      <td style="text-align:right;color:var(--muted);font-size:13px">${r.grid}</td>
      <td style="text-align:right;font-weight:600;color:var(--red)">${r.positionText}</td>
    </tr>`;
  }).join('');
  btn.style.display = 'none';
}

function openConstructorProfile(constructorId) {
  const name = window._constructorMap?.[constructorId] || constructorId;
  loadConstructorProfile(constructorId, name);
}

function backToDriverProfile() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-driver-profile').classList.add('active');
  window.scrollTo(0, 0);
}

function backToConstructorProfile() {
  // Return to the constructor profile panel (already rendered, just re-show it)
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-constructor-profile').classList.add('active');
  window.scrollTo(0, 0);
}

function backToConstructors() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-constructors').classList.add('active');
  document.querySelector('[data-panel="constructors"]').classList.add('active');
  window.scrollTo(0, 0);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function loadSeasons() {
  try {
    const data = await api('seasons');
    const seasons = data.MRData.SeasonTable.Seasons.map(s => s.season).reverse();
    const sel = document.getElementById('season-select');
    seasons.forEach(yr => {
      const opt = document.createElement('option');
      opt.value = yr;
      opt.textContent = yr;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      selectedSeason = sel.value;
      currentRound = 0;
      trendBuilt = false;
      detectedSeason = '';
      // Reset all panels to loading state
      document.getElementById('panel-drivers').innerHTML = '<div class="state-msg"><div class="spinner"></div><div>Loading driver standings...</div></div>';
      document.getElementById('panel-constructors').innerHTML = '<div class="state-msg"><div class="spinner"></div><div>Loading constructor standings...</div></div>';
      document.getElementById('panel-trend').innerHTML = '<div class="state-msg"><div class="spinner"></div><div>Building points trend...</div></div>';
      document.getElementById('panel-schedule').innerHTML = '<div class="state-msg"><div class="spinner"></div><div>Loading schedule...</div></div>';
      // Return to drivers tab
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-panel="drivers"]').classList.add('active');
      document.getElementById('panel-drivers').classList.add('active');
      loadDrivers();
      loadConstructors();
      loadSchedule();
    });
  } catch(e) {
    console.warn('Could not load seasons list', e);
  }
}

loadSeasons();
loadDrivers();
loadConstructors();
loadSchedule();
</script>
</body>
</html>
